---
# Copy of the dryvist/.github canonical .markdownlint-cli2.yaml plus
# repo-specific ignores. Source of truth:
# https://github.com/dryvist/.github/blob/main/.markdownlint-cli2.yaml
# Sync mechanism: manual for now; Renovate custom manager TBD.
#
# Previous local config set `heading_line_length: 120`,
# `code_block_line_length: 160`, `tables: false`, `MD060: false`, and
# `default: true` — all dropped per the canonical and the user's
# no-leniency directive. The MD060 disable was a stale-tooling
# workaround; the right fix is to upgrade markdownlint-cli2 via the
# Renovate-managed pre-commit hook pin (already at v0.22.1 here).

config:
  MD013:
    line_length: 160
    tables: true
    strict: true
    # `heading_line_length` and `code_block_line_length` deliberately not set.
    # An 80-character ceiling is an anti-pattern for modern displays.

ignores:
  - "CHANGELOG.md"
  - ".github/aw/**"
  - "worktrees/**"
  - ".claude/**"
  - ".gemini/**"
