name: Best Practices Recommender

on:
  workflow_dispatch:
  # --- DISABLED AUTOMATIC TRIGGERS (restore by uncommenting) ---
  # schedule:
  #   - cron: "0 3 * * 2,5"
  # --- END DISABLED ---

permissions:
  actions: write
  contents: read
  id-token: write
  issues: write
  pull-requests: read

jobs:
  dispatch:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-trigger as workflow_dispatch
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "$WORKFLOW_NAME" --repo "${{ github.repository }}"

  recommend:
    if: github.event_name != 'schedule'
    uses: dryvist/ai-workflows/.github/workflows/best-practices.yml@main
    secrets: inherit
