name: Code Simplifier

on:
  workflow_dispatch:
  # --- DISABLED AUTOMATIC TRIGGERS (restore by uncommenting) ---
  # schedule:
  #   - cron: "0 4 * * 0,3,6"
  # --- END DISABLED ---

permissions:
  actions: write
  contents: write
  id-token: write
  pull-requests: write

jobs:
  dispatch:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-trigger as workflow_dispatch
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "$WORKFLOW_NAME" --repo "${{ github.repository }}"

  simplify:
    if: github.event_name != 'schedule'
    uses: dryvist/ai-workflows/.github/workflows/code-simplifier.yml@main
    secrets: inherit
